name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22.x"

jobs:

# -----------------------------
# LINT
# -----------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # official fast cached linter
      - name: Run golangci-lint (root)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          args: --timeout=5m ./...

      - name: Run golangci-lint (api-gateway)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          args: --timeout=5m ./...
          working-directory: services/api-gateway

# -----------------------------
# TEST
# -----------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies (root)
        run: go mod download

      - name: Run tests (root)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Download dependencies (api-gateway)
        working-directory: services/api-gateway
        run: go mod download

      - name: Run tests (api-gateway)
        working-directory: services/api-gateway
        run: go test -race -coverprofile=coverage.out ./...

# -----------------------------
# SECURITY
# -----------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck (root)
        run: $(go env GOPATH)/bin/govulncheck ./...

      - name: Run govulncheck (api-gateway)
        working-directory: services/api-gateway
        run: $(go env GOPATH)/bin/govulncheck ./...

# -----------------------------
# DOCKER BUILD
# -----------------------------
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          push: false
          tags: api-gateway:test
          cache-from: type=gha
          cache-to: type=gha,mode=max